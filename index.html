        .linkedin-btn {

            align-items: center;

            text-align: center;

        .specialization-content ul {
            padding: 0 1.5rem;
        }
        .specialization-content li {

        }
        .specialization-content li a {

        }
        .specialization-content li a:hover {

    <script>
        const translations = {

                heroTitle: 'عقود من الخبرة في القانون، والتزام راسخ بالعدالة',
                heroSubtitle: 'محامٍ في الاستئناف ومستشار قانوني مقيد في نقابة المحامين في بيروت منذ عام 1992، وخبير صياغة وترجمة العقود والوثائق القانونية الدولية والتشريعات الإعلامية،',
                philosophyTitle: 'رسالة المكتب وفلسفة العمل القانوني',
                philosophyText: 'إن رسالة المحاماة في مفهومنا لم تكن يوماً مجرد مهنة تجارية، بل هي أمانة فكرية ورسالة إنسانية وقوامها الدفاع عن الحق وإرساء العدالة، إننا نلتزم التزاماً صارماً ومطلقاً بالسرية المهنية، ونحرص حرصاً تاماً على دراسة كل ملف برؤية أكاديمية متعمقة وبحث قضائي دقيق، لبناء علاقات ثقة متينة ودائمة مع موكلينا من الأفراد والمؤسسات داخل لبنان وخارجه، مكرسين أكثر من ثلاثة عقود من الخبرة لتحقيق الحماية القانونية المثلى،',
                specializationsTitle: 'التخصصات والخدمات القانونية الموسعة',
                specializations: [
                    { name: 'الصياغة والترجمة القانونية ثنائية اللغة', id: 'legal-translation' },
                    { name: 'قانون الأعمال وتأسيس الشركات', id: 'company-formation' },
                    { name: 'القانون العقاري ونزاعات الملكية', id: 'real-estate' },
                    { name: 'حصر الإرث والتركات العائلية', id: 'inheritance' },
                    { name: 'قانون العمل ونزاعات الاستخدام', id: 'labor-law' },
                    { name: 'قانون العقوبات والدفاع الجنائي', id: 'criminal-law' },
                    { name: 'قوانين الأحوال الشخصية والأسرة', id: 'family-law' },
                    { name: 'منازعات قضايا التأمين', id: 'insurance' }
                ],
                contactTitle: 'قنوات التواصل الرسمية',
                contactAddress: 'بيروت، لبنان',
                contactPhone: 'رقم الهاتف / واتساب الإداري: <span dir="ltr">+961 71 856207</span>',
                contactEmail: 'البريد الإلكتروني المهني: gbouhabib.attorney.translator@gmail.com',
                whatsappLink: 'التواصل الفوري عبر الواتساب ومناقشة الملفات',
                linkedinLink: 'تواصل معنا مهنياً عبر منصة LinkedIn',
                footerText: '© 2026 المحامي جورج جبران بو حبيب. جميع الحقوق محفوظة.',
                direction: 'rtl',
                backToMain: '&larr; العودة إلى الصفحة الرئيسية',
                backToSection: '&larr; العودة إلى قسم الصياغة والترجمة',
                content: {
                    'legal-translation': `<h2>الصياغة والترجمة القانونية ثنائية اللغة والعقود الدولية</h2><p>بفضل الخبرة الطويلة الممتدة لأكثر من 35 عاماً في الصياغة القضائية والترجمة الاحترافية لشبكات الإعلام الدولية الكبرى (مثل MBC و OSN و Discovery)، يقدم مكتبنا حلولاً تخصصية فريدة ومتقدمة تتجاوز النقل اللغوي التقليدي لتشمل هندسة النصوص القانونية صياغةً وترجمةً باللغتين العربية والإنجليزية معاً، وتتضمن خدماتنا:</p><ul><li><a href="#" onclick="showContent('bilingual-drafting'); return false;">تنظيم وصياغة العقود ثنائية اللغة (العربية والإنجليزية معاً)</a></li><li><a href="#" onclick="showContent('international-contracts'); return false;">مراجعة العقود والاتفاقيات التجارية الدولية وتكييفها</a></li><li><a href="#" onclick="showContent('media-legislations'); return false;">التشريعات الإعلامية وقوانين البث وحقوق الملكية الفكرية</a></li><li><a href="#" onclick="showContent('judicial-translation'); return false;">ترجمة الأحكام القضائية والمذكرات والمستندات الرسمية</a></li></ul>`,
                    'bilingual-drafting': `<h2>تنظيم وصياغة العقود ثنائية اللغة (العربية والإنجليزية معاً)</h2><p>نقوم بتنظيم وصياغة العقود والاتفاقيات بنظام المتن الموازي (العربية والإنجليزية معاً جنباً إلى جنب في ذات الوثيقة)، مما يضمن التطابق التام والمطلق للمصطلحات والمفاهيم القانونية بين اللغتين، ويمنع أي التباس أو تعارض تفسيري قد ينشأ أمام المحاكم المحلية أو هيئات التحكيم الدولية،</p>`,
                    'international-contracts': `<h2>مراجعة العقود والاتفاقيات التجارية الدولية وتكييفها</h2><p>دراسة ومراجعة عقود المساهمين، اتفاقيات الاندماج والاستحواذ، عقود الامتياز (Franchise)، والوكالات التجارية الأجنبية، مع تدقيقها لغوياً وقانونياً لضمان مواءمتها التامة مع القوانين اللبنانية والاتفاقيات الدولية والمعايير التجارية المعمول بها عالمياً،</p>`,
                    'media-legislations': `<h2>التشريعات الإعلامية وقوانين البث وحقوق الملكية الفكرية</h2><p>تقديم استشارات قانونية متخصصة ومصاغة بعناية فائقة في شؤون الإنتاج الإعلامي، عقود التوزيع الفني، حقوق البث التلفزيوني والرقمي، وحماية الملكية الفكرية والعلامات التجارية للشركات والأفراد، مستندين في ذلك إلى إرث حافل وعميق في العمل مع الشبكات الإعلامية الدولية،</p>`,
                    'judicial-translation': `<h2>ترجمة الأحكام القضائية والمذكرات والمستندات الرسمية</h2><p>ترجمة قانونية تخصصية ومعقمة للأحكام الصادرة عن المحاكم الأجنبية، مذكرات الدفاع، المستندات الثبوتية، والتقارير المالية، بنقل دقيق ورصين يحفظ القيمة القانونية والحجية الإثباتية للنص الأصلي أمام كافة المراجع القضائية والإدارية،</p>`,
                    'company-formation': `<h2>قانون الأعمال وتأسيس الشركات وحوكمتها</h2><p>يوفر مكتبنا منظومة متكاملة من الخدمات القانونية الموجهة لرجال الأعمال، الشركات الناشئة، والمجموعات التجارية العائلية، بهدف حماية الاستثمارات وتأمين البيئة القانونية المثالية لنمو الأعمال، وتشمل خدماتنا بالتفصيل:</p><ul><li>اختيار وهيكلة الشكل القانوني للشركات (محدودة المسؤولية، مساهمة، تضامن)،</li><li>حوكمة الشركات، تنظيم محاضر مجالس الإدارة والجمعيات العمومية وصياغة الأنظمة الأساسية،</li><li>إعداد الرأي القانوني (Legal Opinion) للمستثمرين الأجانب والمغتربين اللبنانيين حول مشاريعهم الاستثمارية،</li><li>تخطيط الشركات العائلية وضمان انتقال الحصص والأسهم بين الأجيال بسلاسة قانونية وضريبية،</li></ul>`,
                    'real-estate': `<h2>القانون العقاري ونزاعات الملكية</h2><p>نحن نقدم استشارات قانونية متخصصة وتمثيلاً قضائياً راسخاً في جميع القضايا المتعلقة بالقانون العقاري، وتشمل خبراتنا الواسعة حماية الثروة العقارية وإدارة الأصول:</p><ul><li>الدعاوى العقارية ونزاعات الملكية، تثبيت الحقوق، ورفع التعديات,</li><li>قوانين الإيجارات السكنية وغير السكنية المعقدة (الأنظمة القديمة والجديدة وتعديلاتها)،</li><li>ملاحقة النزاعات الناشئة عن نكول عقود البيع العقارية وطلب التنفيذ التمهيدي،</li><li>إجراءات القسمة العقارية وتصفية الشيوع بين الشركاء أو الورثة (سواء كانت رضائية اتفاقية أو قضائية)،</li></ul>`,
                    'inheritance': `<h2>حصر الإرث والتركات العائلية ونزاعاتها</h2><p>نواكب العائلات في تنظيم شؤون تركاتهم وتصفيتها لضمان انتقال الحقوق والمقتنيات بسلاسة وفقاً للقوانين المرعية، وتشمل الخدمات:</p><ul><li>المعاملات الإدارية والقضائية لاستصدار حصر الإرث، تصفية التركات، ونقل الملكيات،</li><li>إدارة وتسوية نزاعات الورثة بالطرق الودية وصياغة اتفاقات القسمة، أو عبر التقاضي عند تعذر الاتفاق،</li><li>التخطيط الاستباقي لحماية الأصول العائلية وصياغة الوصايا القانونية المتكاملة وضبط آثارها الضريبية،</li></ul>`,
                    'labor-law': `<h2>قانون العمل ومنازعات الاستخدام</h2><p>نصون مصالح وحقوق أطراف الإنتاج (أصحاب العمل والأجراء) من خلال الاستشارات الدقيقة والتمثيل أمام مجالس العمل التحكيمية:</p><ul><li>صياغة عقود العمل الفردية والاتفاقيات الجماعية ولوائح العمل الداخلية للشركات،</li><li>التمثيل والتقاضي في دعاوى الصرف التعسفي، المطالبة ببدل الإنذار، والتعويضات المستحقة،</li><li>الاستشارات المتعلقة بالضمان الاجتماعي، حوادث العمل، وبراءات الذمة،</li></ul>`,
                    'criminal-law': `<h2>قانون العقوبات والدفاع الجنائي</h2><p>نؤمن بأن حق الدفاع هو قدس أقدس القوانين، ويقدم مكتبنا تمثيلاً صارماً في القضايا الجزائية لحماية الحريات والضمانات القانونية:</p><ul><li>مواكبة وحضور التحقيقات الأولية أمام الضابطة العدلية والنيابات العامة وقضاة التحقيق،</li><li>إعداد دفوع ومذكرات الدفاع والترافع أمام محاكم الجنايات، الجنح، والمطبوعات،</li><li>تمثيل الضحايا والمدعين الشخصيين لتحصيل حقوقهم والتعويض عن الأضرار الناشئة عن الجرائم،</li></ul>`,
                    'family-law': `<h2>قوانين الأحوال الشخصية والأسرة</h2><p>إدارة النزاعات الأسرية بخصوصية تامة وحساسية مطلقة تضمن كرامة الأفراد ومصلحة الأطفال الفضلى أمام مختلف المحاكم الروحية والدينية:</p><ul><li>دعاوى الطلاق، الهجر، وبطلان الزواج،</li><li>قضايا تحصيل المهر، النفقة الزوجية، ونفقة الأولاد،</li><li>نزاعات حضانة الأطفال، المشاهدة، والوصاية القانونية على القصر،</li></ul>`,
                    'insurance': `<h2>منازعات قضايا التأمين</h2><p>ملاحقة ومقاضاة شركات التأمين لضمان وفائها بالتزاماتها العقدية بالكامل دون مماطلة:</p><ul><li>دراسة وتحليل عقود التأمين لتحديد نطاق التغطية القانونية بدقة،</li><li>مطالبات التأمين الناشئة عن حوادث السير، الأضرار الجسدية، الممتلكات، والتأمين الصحي،</li><li>تمثيل العملاء في المفاوضات القضائية والودية مع لجان الرقابة على شركات التأمين والمحاكم المختصة،</li></ul>`
                }
            },
            en: {
                title: 'Attorney George J. Bouhabib | Attorney at Law & Legal Consultant',

                whatsappLink: 'Initiate Direct WhatsApp Consultation',
                linkedinLink: 'Connect with Us on LinkedIn',
                footerText: '© 2026 Attorney George J. Bouhabib. All rights reserved.',
                direction: 'ltr',
                backToMain: '&larr; Back to Main Page',
                backToSection: '&larr; Back to Translation Section',
                content: {
                    'legal-translation': `<h2>Bilingual Legal Drafting & International Contracts</h2><p>Leveraging over 35 years of elite jurisprudential and linguistic expertise with leading global media networks (such as MBC, OSN, and Discovery), our firm delivers high-tier legal engineering that bypasses conventional translation. We specialize in synthesizing text across the Anglo-American Common Law and Latin/Civil Law traditions:</p><ul><li><a href="#" onclick="showContent('bilingual-drafting'); return false;">Dual-Language Drafting (structuring concurrent Arabic and English text within a single framework)</a></li><li><a href="#" onclick="showContent('international-contracts'); return false;">Reviewing and localizing international commercial cross-border agreements</a></li><li><a href="#" onclick="showContent('media-legislations'); return false;">Specialized advisory on Media Regulations, broadcasting rights, and Intellectual Property</a></li><li><a href="#" onclick="showContent('judicial-translation'); return false;">High-fidelity translation of foreign judgments and corporate memorandums</a></li></ul>`,
                    'bilingual-drafting': `<h2>Dual-Language Drafting (Arabic & English)</h2><p>We structure contracts using concurrent side-by-side text, guaranteeing absolute harmony between linguistic terms and preventing interpreting conflicts before national courts or international arbitral tribunals.</p>`,
                    'international-contracts': `<h2>Reviewing & Localizing International Contracts</h2><p>Thorough examination of shareholder agreements, M&A operations, franchises, and foreign agencies, tailored to ensure complete compliance with Lebanese public policy and international commercial standards.</p>`,
                    'media-legislations': `<h2>Media Regulations & Intellectual Property</h2><p>Providing custom legal solutions regarding media production, art distribution contracts, and digital broadcasting rights, drawing upon an extensive legacy of working with global networks.</p>`,
                    'judicial-translation': `<h2>Translation of Judgments & Evidentiary Documents</h2><p>High-fidelity translation of foreign judgments, defense sheets, and complex financial reports, retaining the rigorous evidentiary power of the original text before all judicial authorities.</p>`,
                    'company-formation': `<h2>Corporate & Business Law</h2><p>We provide comprehensive corporate services tailored for entrepreneurs, international investors, and family-owned businesses to safeguard capital and optimize commercial operations:</p><ul><li>Corporate structuring and optimal entity selection (LLC, SAL, Partnerships).</li><li>Corporate Governance, drafting bylaws, and board resolutions.</li><li>International Commercial Contracts, franchise, and distribution agreements.</li><li>Cross-border legal consultations and formal Legal Opinions for foreign entities.</li></ul>`,
                    'real-estate': `<h2>Real Estate & Property Litigation</h2><p>Specialized representation and strategic advisory covering property rights, asset management, and complex real estate matters:</p><ul><li>Property disputes, ownership affirmation, and boundary litigation.</li><li>Complex rental laws, covering both historical and modern lease legislations.</li><li>Breach of real estate sales contracts and specific performance lawsuits.</li><li>Judicial and amicable property partitions (dissolution of co-ownership).</li></ul>`,
                    'inheritance': `<h2>Successions & Family Estate Planning</h2><p>Navigating family wealth preservation, asset allocation, and probate management with absolute care and legal foresight:</p><ul><li>Probate procedures, securing inheritance verifications, and managing estate liquidations.</li><li>Amicable mediation and aggressive litigation of complex heir disputes.</li><li>Strategic estate planning, asset protection, and seamless intergenerational transfer of corporate shares.</li></ul>`,
                    'labor-law': `<h2>Labor & Employment Law</h2><p>Protecting the legal parameters of the employment relationship for corporate employers and executives:</p><ul><li>Drafting customized employment contracts and corporate internal regulations.</li><li>Litigation before the Labor Arbitral Councils regarding unfair dismissal and severance packages.</li><li>Advisory on Social Security compliance, workplace safety, and corporate discharge liabilities.</li></ul>`,
                    'criminal-law': `<h2>Criminal Defense & Penal Cases</h2><p>Upholding constitutional and human rights through rigorous representation across all phases of criminal procedures:</p><ul><li>Legal counsel during preliminary police investigations, public prosecution sessions, and investigative judgeships.</li><li>Formulating defense briefs and oral advocacy before Felonies, Misdemeanors, and Press Courts.</li><li>Representing civil claimants to secure just financial compensation arising from penal offenses.</li></ul>`,
                    'family-law': `<h2>Family Law & Personal Status</h2><p>Managing domestic relations with complete discretion, prioritizing emotional stability and asset protection before religious and spiritual tribunals:</p><ul><li>Divorce, separation, and marital annulment litigation.</li><li>Alimony, dowry recovery, and child support enforcement.</li><li>Child custody disputes, visitation rights, and legal guardianships.</li></ul>`,
                    'insurance': `<h2>Insurance Claims & Disputes</h2><p>Holding insurance conglomerates accountable to their contractual duties through rigorous dispute management:</p><ul><li>In-depth policy parsing to delineate exact coverage perimeters.</li><li>Litigating rejected claims stemming from auto accidents, bodily injuries, and commercial losses.</li><li>Representing clients before Insurance Regulatory Committees and competent commercial courts.</li></ul>`
                }
            },
            fr: {

                philosophyTitle: 'Philosophie du Cabinet et Déontologie Professionnelle',

                whatsappLink: 'Démarrer une consultation directe via WhatsApp',
                linkedinLink: 'Rejoignez-nous sur LinkedIn',

                direction: 'ltr',
                backToMain: '&larr; Retour à l\'accueil',
                backToSection: '&larr; Retour à la section Traduction',
                content: {
                    'legal-translation': `<h2>Rédaction Bilingue & Contrats Internationaux</h2><p>Fort d'une expertise de plus de 35 ans auprès de grands réseaux de médias internationaux (tels que MBC, OSN, et Discovery), notre cabinet offre une ingénierie juridique bilingue avancée :</p><ul><li><a href="#" onclick="showContent('bilingual-drafting'); return false;">Rédaction de contrats bilingues juxtaposés (Arabe/Anglais)</a></li><li><a href="#" onclick="showContent('international-contracts'); return false;">Analyse et révision de traités commerciaux internationaux</a></li><li><a href="#" onclick="showContent('media-legislations'); return false;">Conseil en droit des médias et propriété intellectuelle</a></li><li><a href="#" onclick="showContent('judicial-translation'); return false;">Traduction certifiée d'arrêts judiciaires et actes officiels</a></li></ul>`,
                    'bilingual-drafting': `<h2>Contrats Bilingues Juxtaposés</h2><p>Structure rigoureuse préservant la stricte équivalence conceptuelle entre l'arabe et l'anglais au sein du même acte, éliminant ainsi tout risque de divergence interprétative.</p>`,
                    'international-contracts': `<h2>Traité Commerciaux Internationaux</h2><p>Mise en conformité des pactes d'actionnaires, contrats de franchise et statuts d'agences étrangères avec l'ordre public libanais et les conventions transnationales.</p>`,
                    'media-legislations': `<h2>Droit des Médias & Propriété Intellectuelle</h2><p>Assistance pointue pour l'audiovisuel, la distribution artistique et le droit d'auteur numérique, forte d'une longue pratique avec les chaînes satellitaires.</p>`,
                    'judicial-translation': `<h2>Traduction d'Actes Judiciaires & Officiels</h2><p>Translating de jugements étrangers et conclusions de défense avec exactitude pour maintenir leur pleine force probante devant les juridictions compétentes.</p>`,
                    'company-formation': `<h2>Droit des Affaires & Sociétés</h2><p>Nous offrons des services intégrés pour structurer, auditer et pérenniser vos activités commerciales au Liban et à l'étranger :</p><ul><li>Choix de la forme juridique et constitution de sociétés (SARL, SAL, Sociétés de personnes).</li><li>Gouvernance d'entreprise, rédaction des statuts et procès-verbaux.</li><li>Contrats commerciaux internationaux, accords de distribution et franchises.</li><li>Consultations transfrontalières et avis juridiques (Legal Opinions) pour entités étrangères.</li></ul>`,
                    'real-estate': `<h2>Droit Immobilier & Litiges fonciers</h2><p>Protection du patrimoine immobilier et gestion des contentieux complexes :</p><ul><li>Litiges fonciers, confirmation de propriété et contestations de limites.</li><li>Droit des baux commerciaux et d'habitation (anciens et nouveaux systèmes).</li><li>Contentieux liés aux compromis de vente et inexécutions contractuelles.</li><li>Partage immobilier judiciaire et amiable (liquidation d'indivision).</li></ul>`,
                    'inheritance': `<h2>Successions & Planification Familiale</h2><p>Gestion des transmissions de patrimoine et liquidation des successions avec sérénité et sécurité juridique :</p><ul><li>Procédures de dévolution successorale et transfert de propriété immobilière.</li><li>Médiation amiable et gestion des litiges judiciaires entre héritiers.</li><li>Planification successorale et transmission de parts sociales.</li></ul>`,
                    'labor-law': `<h2>Droit du Travail & Contentieux</h2><p>Défense des intérêts des employeurs et des cadres supérieurs :</p><ul><li>Rédaction de contrats de travail et de règlements intérieurs.</li><li>Contentieux devant les conseils d'arbitrage du travail (licenciement abusif, indemnités).</li><li>Conformité à la Sécurité Sociale et accidents du travail.</li></ul>`,
                    'criminal-law': `<h2>Droit Pénal & Défense</h2><p>Préservation rigoureuse de la liberté individuelle à tous les stades de la procédure pénale :</p><ul><li>Assistance lors des enquêtes préliminaires et devant les juges d'instruction.</li><li>Rédaction de mémoires en défense devant les cours criminelles et de presse.</li><li>Représentation des parties civiles pour l'obtention des réparations financières.</li></ul>`,
                    'family-law': `<h2>Droit de la Famille & Statut Personnel</h2><p>Gestion des litiges familiaux avec discrétion devant les tribunaux religieux et spirituels :</p><ul><li>Procédures de divorce, séparation et annulation de mariage.</li><li>Pensions alimentaires, garde d'enfants et exécution des obligations.</li><li>Tutelle et protection juridique des mineurs.</li></ul>`,
                    'insurance': `<h2>Droit des Assurances & Recouvrement</h2><p>Gestion des litiges contre les compagnies d'assurances pour le respect des garanties :</p><ul><li>Analyse des polices d'assurance et délimitation des couvertures.</li><li>Recouvrement d'indemnités (accidents de la route, préjudices corporels).</li><li>Représentation devant les commissions de contrôle et les tribunaux de commerce.</li></ul>`
                }
            }
        };

        let currentLang = 'ar';

        function updateContent() {
            const langData = translations[currentLang];
            
            // Set Page Title and HTML Direction
            document.title = langData.title;
            document.documentElement.dir = langData.direction;
            document.documentElement.lang = currentLang;

            // Header & Hero
            document.getElementById('site-title').textContent = langData.siteTitle;
            document.getElementById('hero-title').textContent = langData.heroTitle;
            document.getElementById('hero-subtitle').textContent = langData.heroSubtitle;

            // Philosophy
            document.getElementById('philosophy-title').textContent = langData.philosophyTitle;
            document.getElementById('philosophy-text').textContent = langData.philosophyText;

            // Specializations Grid Header
            document.getElementById('specializations-title').textContent = langData.specializationsTitle;

            // Build Specializations Grid Dynamically
            const gridContainer = document.getElementById('specializations-list');
            gridContainer.innerHTML = '';
            langData.specializations.forEach(spec => {
                const item = document.createElement('div');
                item.className = 'specialization-item';
                item.innerHTML = `<a href="#" onclick="showContent('${spec.id}'); return false;">${spec.name}</a>`;
                gridContainer.appendChild(item);
            });

            // Contact Section
            document.getElementById('contact-title').textContent = langData.contactTitle;
            document.getElementById('contact-address').textContent = langData.contactAddress;
            document.getElementById('contact-phone').innerHTML = langData.contactPhone;
            document.getElementById('contact-email').textContent = langData.contactEmail;
            document.getElementById('whatsapp-link').textContent = langData.whatsappLink;
            document.getElementById('linkedin-link').textContent = langData.linkedinLink;

            // Footer
            document.getElementById('footer-text').textContent = langData.footerText;

            // Update active link styling
            document.querySelectorAll('.lang-switcher a').forEach(a => a.classList.remove('active'));
            document.getElementById(`lang-${currentLang}`).classList.add('active');

            // Hide dynamic section and show main ones when shifting languages
            showMainSections();
        }

        function switchLanguage(lang) {
            currentLang = lang;
            updateContent();
        }

        function showContent(id) {
            const langData = translations[currentLang];
            const container = document.getElementById('content-container');
            
            // Build the back link depending on context
            let backLinkHTML = '';
            if (['bilingual-drafting', 'international-contracts', 'media-legislations', 'judicial-translation'].includes(id)) {
                backLinkHTML = `<a href="#" class="back-link" onclick="showContent('legal-translation'); return false;">${langData.backToSection}</a>`;
            } else {
                backLinkHTML = `<a href="#" class="back-link" onclick="showMainSections(); return false;">${langData.backToMain}</a>`;
            }

            container.innerHTML = langData.content[id] + backLinkHTML;

            // Hide main blocks, reveal dynamic container
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('philosophy-section').style.display = 'none';
            document.getElementById('specializations-section').style.display = 'none';
            document.getElementById('contact-section').style.display = 'none';
            
            const dynamicSec = document.getElementById('dynamic-content');
            dynamicSec.classList.remove('section-hidden');
            window.scrollTo(0, 0);
        }

        function showMainSections() {
            document.getElementById('home-section').style.display = 'flex';
            document.getElementById('philosophy-section').style.display = 'block';
            document.getElementById('specializations-section').style.display = 'block';
            document.getElementById('contact-section').style.display = 'block';
            
            document.getElementById('dynamic-content').classList.add('section-hidden');
        }

        // Initialize on DOM Load
        document.addEventListener('DOMContentLoaded', () => {
            updateContent();
        });
    </script>

</html>
