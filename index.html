    <style>

            padding: 2.5rem 0;

            text-align: center;

        }
        .section h2::after {
            content: '';

        }
        .specialization-item {

            border-radius: 4px;
            border-top: 3px solid var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .specialization-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .specialization-item a {
            text-decoration: none;
            color: var(--primary-color);

            font-weight: bold;

        }

            border-radius: 4px;
        }
        .contact-info p {
            font-size: 1.2rem;
            margin: 0.6rem 0;
        }
        .contact-info a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
        .contact-info a:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }
        footer {
            background: var(--primary-color);
            color: #fff;
            text-align: center;
            padding: 1.5rem 0;

        .back-link {

        }

        }
        .specialization-content ul {

    <script>
        const translations = {
            ar: {
                title: 'المحامي جورج جبران بو حبيب | محامٍ في الاستئناف',
                siteTitle: 'المحامي جورج جبران بو حبيب',
                heroTitle: 'عقود من الخبرة في القانون، التزام راسخ بالعدالة',
                heroSubtitle: 'محامٍ في الاستئناف في نقابة المحامين في بيروت منذ عام 1992',
                specializationsTitle: 'تخصصاتنا القانونية',
                specializations: [
                    { name: 'القانون العقاري', id: 'real-estate' },
                    { name: 'القانون الجنائي', id: 'criminal-law' },
                    { name: 'قانون الأسرة', id: 'family-law' },
                    { name: 'حصر الإرث', id: 'inheritance' },
                    { name: 'تأسيس الشركات', id: 'company-formation' },
                    { name: 'قانون العمل', id: 'labor-law' },
                    { name: 'قضايا الزواج والطلاق', id: 'marriage-divorce' },
                    { name: 'قضايا التأمين', id: 'insurance' }
                ],
                contactTitle: 'تواصل معنا',
                contactAddress: 'بيروت، لبنان',
                contactPhone: 'رقم الهاتف / واتساب: <span dir="ltr">+961 71 856207</span>',
                contactEmail: 'البريد الإلكتروني: gbouhabib.attorney.translator@gmail.com',
                whatsappLink: 'أرسل رسالة واتساب',
                footerText: '© 2026 المحامي جورج جبران بو حبيب. جميع الحقوق محفوظة.',
                direction: 'rtl',
                content: {
                    'real-estate': `<h2>القانون العقاري</h2><p>نحن نقدم استشارات قانونية متخصصة وتمثيلاً قضائياً في جميع القضايا المتعلقة بالقانون العقاري. تشمل خبراتنا الواسعة:</p><ul><li><a href="#" onclick="showContent('real-estate-litigation'); return false;">دعاوى عقارية</a></li><li><a href="#" onclick="showContent('rental-litigation'); return false;">دعاوى الإيجارات</a></li><li><a href="#" onclick="showContent('sales-contracts'); return false;">دعاوى عقود البيع</a></li><li><a href="#" onclick="showContent('real-estate-division'); return false;">القسمة العقارية</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'real-estate-litigation': `<h2>دعاوى عقارية</h2><p>نتولى جميع جوانب النزاعات العقارية، بما في ذلك نزاعات الملكية، والحدود، والمشاكل المتعلقة باتفاقيات الشراء، ويقدم مكتبنا تمثيلاً قانونياً قوياً لحماية حقوق الملكية الخاصة بك،</p><p>تشمل خدماتنا:</p><ul><li>تمثيل العملاء في المحاكم في دعاوى العقارات،</li><li>التفاوض على التسويات،</li><li>تقديم المشورة بشأن الاستراتيجيات القانونية للنزاعات العقارية،</li></ul><a href="#" class="back-link" onclick="showContent('real-estate'); return false;">&larr; العودة إلى القانون العقاري</a>`,
                    'rental-litigation': `<h2>دعاوى الإيجارات</h2><p>نحن نساعد كلاً من الملاك والمستأجرين في حل النزاعات المتعلقة باتفاقيات الإيجار، ويشمل ذلك قضايا مثل عمليات الإخلاء، وعدم دفع الإيجار، والإخلال بشروط العقد،</p><p>تشمل خدماتنا:</p><ul><li>تمثيل الملاك في إجراءات الإخلاء،</li><li>مساعدة المستأجرين في دعاوى الإخلاء غير القانوني،</li><li>صياغة ومراجعة اتفاقيات الإيجار لمنع النزاعات المستقبلية،</li></ul><a href="#" class="back-link" onclick="showContent('real-estate'); return false;">&larr; العودة إلى القانون العقاري</a>`,
                    'sales-contracts': `<h2>دعاوى عقود البيع</h2><p>نقدم المساعدة القانونية للنزاعات التي تنشأ من عقود البيع العقارية، ويشمل ذلك القضايا المتعلقة بانتهاكات العقود، والتحريف، والفشل في الكشف عن العيوب،</p><p>تشمل خدماتنا:</p><ul><li>التقاضي في قضايا خرق العقود،</li><li>مراجعة عقود البيع لضمان الامتثال القانوني،</li><li>تقديم المشورة بشأن الآثار القانونية لشروط العقد،</li></ul><a href="#" class="back-link" onclick="showContent('real-estate'); return false;">&larr; العودة إلى القانون العقاري</a>`,
                    'real-estate-division': `<h2>القسمة العقارية</h2><p>القسمة العقارية هي عملية تقسيم ملكية عقار مشترك بين عدة مالكين، ويمكن أن تكون هذه القسمة اتفاقية أو قضائية، وفي كلتا الحالتين، نحن نقدم الدعم القانوني الكامل لضمان حقوق كل طرف،</p><p>تشمل خدماتنا:</p><ul><li>صياغة عقود القسمة الاتفاقية،</li><li>التمثيل القانوني في دعاوى القسمة القضائية،</li><li>تسوية النزاعات المتعلقة بتقسيم العقارات،</li></ul><a href="#" class="back-link" onclick="showContent('real-estate'); return false;">&larr; العودة إلى القانون العقاري</a>`,
                    'criminal-law': `<h2>القانون الجنائي</h2><p>نقدم استشارات قانونية وتمثيلاً قضائياً في مجموعة واسعة من القضايا الجنائية، مع التركيز على حقوق المتهمين وتطبيق القانون بإنصاف، تشمل خدماتنا:</p><ul><li><a href="#" onclick="showContent('criminal-defense'); return false;">الدفاع الجنائي</a></li><li><a href="#" onclick="showContent('crime-victims'); return false;">تمثيل ضحايا الجريمة</a></li><li><a href="#" onclick="showContent('preliminary-investigations'); return false;">التحقيقات الأولية</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'criminal-defense': `<h2>الدفاع الجنائي</h2><p>نحن ندافع عن حقوق الأفراد المتهمين بارتكاب جرائم، وخدماتنا تغطي مختلف المراحل القانونية، بدءاً من مرحلة التحقيق وحتى المحاكمة، ونحن ملتزمون بتقديم دفاع قوي لضمان حصولك على محاكمة عادلة،</p><p>تشمل خدماتنا:</p><ul><li>تمثيل المتهمين في المحاكم،</li><li>تقديم استشارات قانونية خلال التحقيق،</li><li>إعداد المذكرات والطعون القانونية،</li></ul><a href="#" class="back-link" onclick="showContent('criminal-law'); return false;">&larr; العودة إلى القانون الجنائي</a>`,
                    'crime-victims': `<h2>تمثيل ضحايا الجريمة</h2><p>نقدم الدعم القانوني للضحايا لضمان حصولهم على العدالة، ونحن نمثل الضحايا في المحاكم، ونعمل على حماية حقوقهم والحصول على تعويضات مناسبة عن الأضرار التي لحقت بهم،</p><p>تشمل خدماتنا:</p><ul><li>تقديم الشكاوى القانونية،</li><li>تمثيل الضحايا في المحاكم،</li><li>المطالبة بالتعويضات،</li></ul><a href="#" class="back-link" onclick="showContent('criminal-law'); return false;">&larr; العودة إلى القانون الجنائي</a>`,
                    'preliminary-investigations': `<h2>التحقيقات الأولية</h2><p>نقدم المساعدة القانونية للأفراد أثناء مرحلة التحقيقات الأولية، لضمان أن جميع الإجراءات تتم وفقاً للقانون وأن حقوقك محفوظة، ونقدم النصائح والإرشادات اللازمة للتعامل مع سلطات التحقيق،</p><p>تشمل خدماتنا:</p><ul><li>حضور جلسات التحقيق مع العميل،</li><li>تقديم المشورة القانونية،</li><li>مراجعة الوثائق المتعلقة بالتحقيق،</li></ul><a href="#" class="back-link" onclick="showContent('criminal-law'); return false;">&larr; العودة إلى القانون الجنائي</a>`,
                    'family-law': `<h2>قانون الأسرة</h2><p>ندرك حساسية قضايا الأسرة وأهمية التعامل معها بمهنية وحساسية عالية، ونقدم الدعم القانوني في جميع جوانب قانون الأسرة، بما في ذلك:</p><ul><li><a href="#" onclick="showContent('divorce'); return false;">الطلاق والنفقة</a></li><li><a href="#" onclick="showContent('custody'); return false;">قضايا الحضانة</a></li><li><a href="#" onclick="showContent('guardianship'); return false;">الوصاية القانونية</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'divorce': `<h2>الطلاق والنفقة</h2><p>نحن نقدم المشورة القانونية والتمثيل في قضايا الطلاق، ونعمل على تسهيل عملية الطلاق وحل القضايا المتعلقة بالنفقة وتوزيع الأصول بشكل عادل وقانوني،</p><p>تشمل خدماتنا:</p><ul><li>إجراءات الطلاق،</li><li>التقاضي بشأن تسوية النفقة،</li><li>إعداد اتفاقيات تسوية الطلاق،</li></ul><a href="#" class="back-link" onclick="showContent('family-law'); return false;">&larr; العودة إلى قانون الأسرة</a>`,
                    'custody': `<h2>قضايا الحضانة</h2><p>حضانة الأطفال هي من أكثر القضايا حساسية، ونحن نمثل أولياء الأمور لضمان مصلحة الطفل الفضلى، ونساعد في التوصل إلى اتفاقيات ودية أو نمثلهم في المحكمة لتحديد حقوق الحضانة،</p><p>تشمل خدماتنا:</p><ul><li>الوساطة في قضايا الحضانة،</li><li>التمثيل القانوني في محاكم الأسرة،</li><li>المساعدة في تعديل اتفاقيات الحضانة،</li></ul><a href="#" class="back-link" onclick="showContent('family-law'); return false;">&larr; العودة إلى قانون الأسرة</a>`,
                    'guardianship': `<h2>الوصاية القانونية</h2><p>نقدم المساعدة في قضايا الوصاية على القصر أو الأفراد غير القادرين على رعاية أنفسهم، ونساعد في تقديم الطلبات القانونية وتقديم المشورة حول مسؤوليات الوصي،</p><p>تشمل خدماتنا:</p><ul><li>إعداد وتقديم طلبات الوصاية،</li><li>تقديم المشورة حول حقوق وواجبات الوصي،</li><li>التمثيل القانوني في قضايا الوصاية،</li></ul><a href="#" class="back-link" onclick="showContent('family-law'); return false;">&larr; العودة إلى قانون الأسرة</a>`,
                    'inheritance': `<h2>حصر الإرث</h2><p>نقدم استشارات وإجراءات قانونية لمساعدتك في قضايا حصر الإرث وتوزيع الممتلكات بشكل عادل ووفقاً للقوانين المعمول بها، تشمل خدماتنا:</p><ul><li><a href="#" onclick="showContent('probate'); return false;">إجراءات حصر الإرث وتصفيته</a></li><li><a href="#" onclick="showContent('heir-disputes'); return false;">نزاعات الورثة</a></li><li><a href="#" onclick="showContent('estate-planning'); return false;">تخطيط التركات</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'probate': `<h2>إجراءات حصر الإرث وتصفيته</h2><p>نحن نتولى جميع الإجراءات القانونية اللازمة لتصفية التركات، ونقوم بإعداد الوثائق اللازمة، ونتعامل مع المحاكم والسلطات المختصة لضمان توزيع الميراث بسلاسة وسرعة،</p><p>تشمل خدماتنا:</p><ul><li>إعداد وثائق حصر الإرث،</li><li>إجراءات تصفية التركة،</li><li>تسجيل الأصول وتوزيعها على الورثة،</li></ul><a href="#" class="back-link" onclick="showContent('inheritance'); return false;">&larr; العودة إلى حصر الإرث</a>`,
                    'heir-disputes': `<h2>نزاعات الورثة</h2><p>نقدم حلولاً قانونية للنزاعات التي قد تنشأ بين الورثة، وسواء كان الأمر يتعلق بصحة الوصية أو بطريقة توزيع الأصول، فإننا نعمل على حل النزاعات من خلال الوساطة أو التقاضي لحماية حقوق عملائنا،</p><p>تشمل خدماتنا:</p><ul><li>الوساطة بين الورثة،</li><li>التمثيل القانوني في المحكمة،</li><li>التقاضي في قضايا الاعتراض على الوصية،</li></ul><a href="#" class="back-link" onclick="showContent('inheritance'); return false;">&larr; العودة إلى حصر الإرث</a>`,
                    'estate-planning': `<h2>تخطيط التركات</h2><p>نحن نساعد الأفراد في تخطيط تركاتهم مسبقاً لضمان حماية أصولهم وتوزيعها على أحبائهم وفقاً لرغباتهم، ويشمل ذلك إعداد الوصايا، وتحديد الوكلاء القانونيين، وتقديم المشورة حول الضرائب،</p><p>تشمل خدماتنا:</p><ul><li>صياغة الوصايا،</li><li>تحديد الأوصياء على الممتلكات،</li><li>تقديم المشورة بشأن التخطيط المالي للتركة،</li></ul><a href="#" class="back-link" onclick="showContent('inheritance'); return false;">&larr; العودة إلى حصر الإرث</a>`,
                    'company-formation': `<h2>تأسيس الشركات</h2><p>نقدم المساعدة في جميع الإجراءات القانونية اللازمة لتأسيس شركتك، بدءاً من اختيار النوع القانوني المناسب وحتى استكمال التسجيل وتجهيز العقود، تشمل خدماتنا:</p><ul><li><a href="#" onclick="showContent('legal-form'); return false;">اختيار الشكل القانوني</a></li><li><a href="#" onclick="showContent('corporate-contracts'); return false;">صياغة العقود والنظام الأساسي</a></li><li><a href="#" onclick="showContent('registration-process'); return false;">إجراءات التسجيل</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'legal-form': `<h2>اختيار الشكل القانوني</h2><p>نقدم المشورة لمساعدتك في اختيار أفضل شكل قانوني لشركتك (شركة فردية، شركة تضامن، شركة ذات مسؤولية محدودة، إلخ) بناءً على أهدافك وميزانيتك ومستوى المخاطر،</p><p>تشمل خدماتنا:</p><ul><li>تحليل الأهداف التجارية،</li><li>تقديم المشورة حول المسؤوليات القانونية لكل شكل،</li><li>مقارنة المزايا والعيوب لكل نوع من الشركات،</li></ul><a href="#" class="back-link" onclick="showContent('company-formation'); return false;">&larr; العودة إلى تأسيس الشركات</a>`,
                    'corporate-contracts': `<h2>صياغة العقود والنظام الأساسي</h2><p>نحن نساعد في صياغة جميع العقود والوثائق القانونية اللازمة لشركتك، مثل النظام الأساسي للشركة، واتفاقيات الشراكة، وعقود المساهمين، ونضمن أن تكون هذه الوثائق شاملة ومتوافقة مع القوانين،</p><p>تشمل خدماتنا:</p><ul><li>صياغة النظام الأساسي للشركة،</li><li>إعداد اتفاقيات الشركاء،</li><li>مراجعة العقود لضمان الالتزام القانوني،</li></ul><a href="#" class="back-link" onclick="showContent('company-formation'); return false;">&larr; العودة إلى تأسيس الشركات</a>`,
                    'registration-process': `<h2>إجراءات التسجيل</h2><p>نحن نتولى جميع الإجراءات الإدارية والقانونية اللازمة لتسجيل شركتك لدى الجهات المختصة، مثل السجل التجاري والجهات الحكومية الأخرى، ونوفر عليك الوقت والجهد في هذه العملية،</p><p>تشمل خدماتنا:</p><ul><li>تقديم الأوراق اللازمة للتسجيل،</li><li>التواصل مع الجهات الحكومية،</li><li>متابعة إجراءات التسجيل حتى اكتمالها،</li></ul><a href="#" class="back-link" onclick="showContent('company-formation'); return false;">&larr; العودة إلى تأسيس الشركات</a>`,
                    'labor-law': `<h2>قانون العمل</h2><p>نوفر استشارات قانونية متخصصة لحماية حقوق العمال وأصحاب العمل، بدءاً من صياغة العقود وحتى حل النزاعات، تشمل خدماتنا:</p><ul><li><a href="#" onclick="showContent('labor-contracts'); return false;">صياغة عقود العمل</a></li><li><a href="#" onclick="showContent('work-disputes'); return false;">النزاعات العمالية</a></li><li><a href="#" onclick="showContent('employee-rights'); return false;">حقوق العمال وأصحاب العمل</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'labor-contracts': `<h2>صياغة عقود العمل</h2><p>نحن نساعد في صياغة عقود عمل واضحة وشاملة تتوافق مع القوانين اللبنانية، مما يحمي حقوق الطرفين ويمنع النزاعات المستقبلية، ونضمن أن تكون العقود عادلة وشفافة،</p><p>تشمل خدماتنا:</p><ul><li>إعداد عقود عمل مخصصة،</li><li>مراجعة العقود القائمة،</li><li>تقديم المشورة حول الشروط القانونية،</li></ul><a href="#" class="back-link" onclick="showContent('labor-law'); return false;">&larr; العودة إلى قانون العمل</a>`,
                    'work-disputes': `<h2>النزاعات العمالية</h2><p>نقدم المساعدة القانونية لحل النزاعات التي قد تنشأ بين العمال وأصحاب العمل، وسواء كان ذلك من خلال الوساطة أو التقاضي، ونحن نعمل على تحقيق حلول عادلة وسريعة،</p><p>تشمل خدماتنا:</p><ul><li>الوساطة في النزاعات العمالية،</li><li>التمثيل القانوني في المحكمة،</li><li>المساعدة في التفاوض على التسويات،</li></ul><a href="#" class="back-link" onclick="showContent('labor-law'); return false;">&larr; العودة إلى قانون العمل</a>`,
                    'employee-rights': `<h2>حقوق العمال وأصحاب العمل</h2><p>نحن نقدم المشورة القانونية حول حقوق وواجبات كل من العمال وأصحاب العمل وفقاً لقانون العمل اللبناني، ونساعد في فهم القوانين المتعلقة بالأجور، والإجازات، وظروف العمل،</p><p>تشمل خدماتنا:</p><ul><li>الاستشارات حول قانون العمل،</li><li>حل قضايا الفصل التعسفي،</li><li>المساعدة في قضايا الأجور غير المدفوعة،</li></ul><a href="#" class="back-link" onclick="showContent('labor-law'); return false;">&larr; العودة إلى قانون العمل</a>`,
                    'marriage-divorce': `<h2>قضايا الزواج والطلاق</h2><p>نوفر التوجيه القانوني في قضايا الزواج والطلاق، مع التركيز على حقوق الأطراف المعنية وحل الخلافات بأفضل الطرق الممكنة، تشمل خدماتنا:</p><ul><li><a href="#" onclick="showContent('marriage-procedures'); return false;">إجراءات الزواج والطلاق</a></li><li><a href="#" onclick="showContent('marital-agreements'); return false;">اتفاقيات ما قبل الزواج</a></li><li><a href="#" onclick="showContent('marital-disputes'); return false;">تسوية الخلافات الزوجية</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'marriage-procedures': `<h2>إجراءات الزواج والطلاق</h2><p>نحن نقدم المساعدة القانونية في جميع إجراءات الزواج والطلاق، بما في ذلك إعداد الوثائق وتقديمها إلى المحاكم المختصة، ونضمن أن تتم الإجراءات بسلاسة ووفقاً للقانون،</p><p>تشمل خدماتنا:</p><ul><li>إعداد عقود الزواج،</li><li>إجراءات الطلاق،</li><li>تمثيل الأطراف في المحاكم،</li></ul><a href="#" class="back-link" onclick="showContent('marriage-divorce'); return false;">&larr; العودة إلى قضايا الزواج والطلاق</a>`,
                    'marital-agreements': `<h2>اتفاقيات ما قبل الزواج</h2><p>نحن نساعد في صياغة اتفاقيات ما قبل الزواج لحماية الأصول وتوضيح الحقوق والواجبات المالية لكلا الطرفين، وهذه الاتفاقيات توفر الأمان والوضوح في العلاقة الزوجية،</p><p>تشمل خدماتنا:</p><ul><li>صياغة اتفاقيات ما قبل الزواج،</li><li>مراجعة العقود،</li><li>تقديم المشورة القانونية حول الاتفاقيات،</li></ul><a href="#" class="back-link" onclick="showContent('marriage-divorce'); return false;">&larr; العودة إلى قضايا الزواج والطلاق</a>`,
                    'marital-disputes': `<h2>تسوية الخلافات الزوجية</h2><p>نحن نقدم الوساطة والمساعدة القانونية لحل الخلافات التي تنشأ بين الزوجين، ونعمل على إيجاد حلول ودية دون اللجوء إلى المحكمة كلما كان ذلك ممكناً، مع حماية حقوق كل طرف،</p><p>تشمل خدماتنا:</p><ul><li>الوساطة في الخلافات الزوجية،</li><li>صياغة اتفاقيات التسوية،</li><li>تقديم المشورة القانونية،</li></ul><a href="#" class="back-link" onclick="showContent('marriage-divorce'); return false;">&larr; العودة إلى قضايا الزواج والطلاق</a>`,
                    'insurance': `<h2>قضايا التأمين</h2><p>نحن نقدم استشارات قانونية وتمثيلاً قضائياً في جميع القضايا المتعلقة بالتأمين، لضمان حصول عملائنا على حقوقهم، تشمل خدماتنا:</p><ul><li><a href="#" onclick="showContent('insurance-claims'); return false;">مطالبات التأمين</a></li><li><a href="#" onclick="showContent('insurance-disputes'); return false;">النزاعات مع شركات التأمين</a></li><li><a href="#" onclick="showContent('court-representation'); return false;">التمثيل في المحاكم</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; العودة إلى التخصصات</a>`,
                    'insurance-claims': `<h2>مطالبات التأمين</h2><p>نحن نساعد العملاء في تقديم مطالبات التأمين ومتابعتها لضمان حصولهم على التعويضات المستحقة، ونقدم المشورة القانونية حول حقوقهم في حالة رفض شركة التأمين الدفع،</p><p>تشمل خدماتنا:</p><ul><li>مساعدة في إعداد المطالبات،</li><li>التفاوض مع شركات التأمين،</li><li>التمثيل القانوني في حال رفض المطالبة،</li></ul><a href="#" class="back-link" onclick="showContent('insurance'); return false;">&larr; العودة إلى قضايا التأمين</a>`,
                    'insurance-disputes': `<h2>النزاعات مع شركات التأمين</h2><p>نحن نمثل العملاء في النزاعات مع شركات التأمين، وسواء كانت بسبب رفض المطالبة، أو تأخير الدفع، أو أي انتهاك آخر للعقد، ونحن نعمل على حل هذه النزاعات بسرعة وفعالية،</p><p>تشمل خدماتنا:</p><ul><li>الوساطة والتحكيم،</li><li>التقاضي في المحكمة،</li><li>تحليل العقود للتأكد من حقوق العميل،</li></ul><a href="#" class="back-link" onclick="showContent('insurance'); return false;">&larr; العودة إلى قضايا التأمين</a>`,
                    'court-representation': `<h2>التمثيل في المحاكم</h2><p>نحن نمثل العملاء في المحاكم في قضايا التأمين المعقدة، ولدينا خبرة في التعامل مع القضايا التي تتطلب خبرة قانونية متخصصة لضمان حصول العملاء على أفضل نتيجة ممكنة،</p><p>تشمل خدماتنا:</p><ul><li>إعداد الدفوع القانونية،</li><li>تمثيل العميل في جلسات المحكمة،</li><li>تقديم الطعون القانونية،</li></ul><a href="#" class="back-link" onclick="showContent('insurance'); return false;">&larr; العودة إلى قضايا التأمين</a>`
                }
            },

                direction: 'ltr',
                content: {
                    'real-estate': `<h2>Real Estate Law</h2><p>We provide specialized legal consultations and judicial representation in all cases related to real estate law. Our extensive expertise includes:</p><ul><li><a href="#" onclick="showContent('real-estate-litigation'); return false;">Real Estate Litigation</a></li><li><a href="#" onclick="showContent('rental-litigation'); return false;">Rental Litigation</a></li><li><a href="#" onclick="showContent('sales-contracts'); return false;">Sales Contract Lawsuits</a></li><li><a href="#" onclick="showContent('real-estate-division'); return false;">Real Estate Division</a></li></ul><a href="#" class="back-link" onclick="showSection('specializations-section'); return false;">&larr; Back to Specializations</a>`

        let currentLang = 'ar';

        function updateContent() {
            const langData = translations[currentLang];
            document.title = langData.title;
            document.getElementById('site-title').textContent = langData.siteTitle;
            document.getElementById('hero-title').textContent = langData.heroTitle;
            document.getElementById('hero-subtitle').textContent = langData.heroSubtitle;
            document.getElementById('specializations-title').textContent = langData.specializationsTitle;
            document.getElementById('contact-title').textContent = langData.contactTitle;
            document.getElementById('contact-address').textContent = langData.contactAddress;
            document.getElementById('contact-phone').innerHTML = langData.contactPhone;
            document.getElementById('contact-email').textContent = langData.contactEmail;
            
            const whatsapp = document.getElementById('whatsapp-link');
            whatsapp.textContent = langData.whatsappLink;
            whatsapp.href = `https://wa.me/96171856207`;

            document.getElementById('footer-text').textContent = langData.footerText;

            document.body.dir = langData.direction;
            document.getElementById('home-section').style.textAlign = langData.direction === 'rtl' ? 'right' : 'left';

            const specList = document.getElementById('specializations-list');
            specList.innerHTML = '';
            langData.specializations.forEach(spec => {
                const item = document.createElement('div');
                item.className = 'specialization-item';
                item.innerHTML = `<a href="#" onclick="showContent('${spec.id}'); return false;">${spec.name}</a>`;
                specList.appendChild(item);
            });

            showSection('all');
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-switcher a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            updateContent();
        }

        function showSection(sectionId) {
            if (sectionId === 'all') {
                document.getElementById('home-section').style.display = 'flex';
                document.getElementById('specializations-section').style.display = 'block';
                document.getElementById('contact-section').style.display = 'block';
                document.getElementById('dynamic-content').style.display = 'none';
            } else {
                document.getElementById('home-section').style.display = 'none';
                document.getElementById('specializations-section').style.display = 'none';
                document.getElementById('contact-section').style.display = 'none';
                document.getElementById('dynamic-content').style.display = 'block';
            }
        }

        function showContent(contentId) {
            const container = document.getElementById('content-container');
            const langData = translations[currentLang];
            if (langData.content[contentId]) {
                container.innerHTML = langData.content[contentId];
                showSection('dynamic');
                window.scrollTo(0, 0);
            } else {
                showSection('all');
            }
        }

        // Initialize
        updateContent();
    </script>
